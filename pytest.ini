[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --color=yes

markers =
    unit: 单元测试 - 测试单一函数/类行为
    integration: 集成测试 - 测试模块间交互
    e2e: 端到端测试 - 完整工作流
    mock: Mock 测试 - 无外部依赖 (默认)
    real_api: 真实 API 测试 - 需要 API key
    slow: 慢速测试 - 执行时间超过 1 秒
    windows: Windows 平台特定测试
    asyncio: 异步测试用例
    context: 上下文管理测试
    agent: Agent 核心测试
    tools: 工具测试

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S